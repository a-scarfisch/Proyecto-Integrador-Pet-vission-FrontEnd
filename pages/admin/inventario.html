<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PetVission — Panel Administrador</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="../../assets/css/admin.css" rel="stylesheet" />
</head>
<body>

<div class="admin-layout">

  <!-- SIDEBAR -->
  <aside class="admin-sidebar" id="adminSidebar">

    <div class="admin-sidebar-brand">
      <div class="d-flex align-items-center gap-2">
        <div class="brand-icon">
          <i class="bi bi-heart-pulse-fill"></i>
        </div>
        <div>
          <div class="fw-bold">PetVission</div>
          <div style="font-size:0.72rem;opacity:0.7;">Panel Administrador</div>
        </div>
      </div>
    </div>

    <nav class="admin-nav">

      <div class="admin-nav-label">Principal</div>
      <a href="dashboard.html" class="admin-nav-link active">
        <i class="bi bi-grid-fill"></i>
        <span>Inicio</span>
      </a>

      <div class="admin-nav-label mt-3">Gestión</div>
      <a href="usuarios.html" class="admin-nav-link">
        <i class="bi bi-people-fill"></i>
        <span>Usuarios</span>
      </a>
      <a href="veterinarios.html" class="admin-nav-link">
        <i class="bi bi-heart-pulse-fill"></i>
        <span>Veterinarios</span>
      </a>
      <a href="dependencias.html" class="admin-nav-link">
        <i class="bi bi-paw-fill" ></i>
        <span>Dependencias</span>
      </a>
      <a href="reserva.html" class="admin-nav-link">
        <i class="bi bi-calendar3"></i>
        <span>Reserva</span>
      </a>

      <div class="admin-nav-label mt-3">Sistema</div>
      <a href="reportes.html" class="admin-nav-link">
        <i class="bi bi-bar-chart-fill"></i>
        <span>Reportes</span>
      </a>
      <a href="configuracion.html" class="admin-nav-link">
        <i class="bi bi-gear-fill"></i>
        <span>Configuración</span>
      </a>

    </nav>

    <div class="admin-sidebar-footer">
      <div class="d-flex align-items-center gap-2 mb-3">
        <div class="admin-avatar">AD</div>
        <div>
          <div class="fw-semibold small">Administrador</div>
          <div style="font-size:0.72rem;opacity:0.7;">admin@petvission.cl</div>
        </div>
      </div>
      <a href="../../index.html" class="admin-nav-link px-0">
        <i class="bi bi-box-arrow-right"></i>
        <span>Cerrar Sesión</span>
      </a>
    </div>

  </aside>

  <div class="admin-sidebar-overlay" id="adminOverlay" onclick="toggleSidebar()"></div>

  <!-- CONTENIDO PRINCIPAL -->
  <div class="admin-main">

    <!-- TOPBAR -->
    <div class="admin-topbar">
      <button class="btn btn-sm border-0 d-lg-none me-2" onclick="toggleSidebar()">
        <i class="bi bi-list fs-4"></i>
      </button>
      <div>
        <h5 class="fw-bold mb-0">Dashboard</h5>
        <small class="text-muted" id="fechaHoy"></small>
      </div>
      <div class="admin-search d-none d-md-block">
        <i class="bi bi-search"></i>
        <input type="text" placeholder="Buscar..." />
      </div>
      <div class="d-flex align-items-center gap-2">
        <button class="btn btn-light rounded-circle position-relative p-2">
          <i class="bi bi-bell fs-5"></i>
          <span class="position-absolute top-0 end-0 badge rounded-pill bg-danger"
                style="font-size:0.6rem;">5</span>
        </button>
        <div class="admin-avatar-sm">AD</div>
      </div>
    </div>
