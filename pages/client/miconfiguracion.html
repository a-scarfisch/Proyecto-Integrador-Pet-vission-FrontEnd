<!DOCTYPE html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PetVission — Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="../../assets/css/styles.css" rel="stylesheet" />
</head>
<body class="dashboard-body">
  <html lang="es">

  <!-- NAVBAR SUPERIOR -->
  <nav class="navbar navbar-expand-lg bg-white shadow-sm px-3 sticky-top">
    <div class="container-fluid">

      <!-- Hamburger (mobile) -->
      <button class="btn btn-sm me-2 d-lg-none border-0"
              onclick="toggleSidebar()">
        <i class="bi bi-list fs-4 text-teal"></i>
      </button>

      <!-- Brand -->
      <a class="navbar-brand fw-bold text-teal d-flex align-items-center gap-2" href="#">
        <i class="bi bi-heart-pulse-fill"></i>
        PetVission
      </a>

      <!-- Buscador desktop -->
      <div class="d-none d-md-flex flex-grow-1 mx-4">
        <div class="input-group" style="max-width:380px;">
          <span class="input-group-text bg-light border-end-0">
            <i class="bi bi-search text-muted"></i>
          </span>
          <input type="text"
                 class="form-control bg-light border-start-0"
                 placeholder="Buscar..." />
        </div>
      </div>

      <!-- Acciones navbar -->
      <div class="d-flex align-items-center gap-3 ms-auto">
        <!-- Notificaciones -->
        <div class="position-relative">
          <button class="btn btn-light rounded-circle p-2">
            <i class="bi bi-bell fs-5 text-muted"></i>
          </button>
          <span class="position-absolute top-0 end-0 badge rounded-pill bg-danger"
                style="font-size:0.6rem;">2</span>
        </div>

        <!-- Avatar usuario -->
        <div class="dropdown">
          <button class="btn d-flex align-items-center gap-2 p-0 border-0"
                  data-bs-toggle="dropdown">
            <div class="avatar-circle bg-teal text-white fw-bold">JP</div>
            <span class="d-none d-md-inline fw-medium small">Juan Pérez</span>
            <i class="bi bi-chevron-down small text-muted"></i>
          </button>
          <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2">
            <li><a class="dropdown-item" href="miperfil.html"><i class="bi bi-person me-2 text-teal"></i>Mi perfil</a></li>
            <li><a class="dropdown-item" href="miconfiguracion.html"><i class="bi bi-gear me-2 text-teal"></i>Configuración</a></li>
            <li><hr class="dropdown-divider"></li>
            <li>
              <a class="dropdown-item text-danger" href="../auth/login.html">
                <i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión
              </a>
            </li>
          </ul>
        </div>
      </div>

    </div>
  </nav>

  <div class="dashboard-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-inner">

        <!-- Nav items -->
        <ul class="sidebar-nav">
          <li class="sidebar-label">Principal</li>

          <li>
            <a href="dashboard.html" class="sidebar-link active">
              <i class="bi bi-grid-fill"></i>
              <span>Dashboard</span>
            </a>
          </li>
          <li>
            <a href="mascotas.html" class="sidebar-link">
              <i class="bi bi-heart-fill"></i>
              <span>Mis Mascotas</span>
              <span class="badge bg-teal-light text-teal ms-auto">2</span>
            </a>
          </li>
          <li>
            <a href="misreserva.html" class="sidebar-link">
              <i class="bi bi-calendar2-check-fill"></i>
              <span>Mis Reserva</span>
              <span class="badge bg-warning text-dark ms-auto">1</span>
            </a>
          </li>
        
          <li class="sidebar-label mt-3">Cuenta</li>

          <li>
            <a href="miperfil.html" class="sidebar-link">
              <i class="bi bi-person-fill"></i>
              <span>Mi Perfil</span>
            </a>
          </li>
          <li>
            <a href="../auth/login.html" class="sidebar-link text-danger">
              <i class="bi bi-box-arrow-right"></i>
              <span>Cerrar sesión</span>
            </a>
          </li>
        </ul>

      </div>
    </aside>

    <!-- OVERLAY mobile -->
    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>
